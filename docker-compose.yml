services:
  postgres:
    image: postgis/postgis:16-3.4

    container_name: agri_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: agri_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mikaelson

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

    container_name: agri_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: agri_backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    env_file:
      - .env.local

    ports:
      - "8001:8000"

    volumes:
      - ./backend:/app
      - ./.env.local:/app/.env.local

    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn services.api_gateway.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      "

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: agri_worker

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    env_file:
      - .env.local

    volumes:
      - ./backend:/app
      - ./.env.local:/app/.env.local

    command: python worker.py

volumes:
  postgres_data:

  redis_data:
